<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Art of Molecular Dynamics Simulation - Fullscreen</title>
    <style>
        :root {
            --blue-bg: #3a5ba0;
            --light-green: #c1d72e;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--blue-bg);
        }

        .book-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Верхняя секция — занимает всё свободное пространство */
        .top-section {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 5vw;
            color: white;
        }

        .author-box {
            font-size: 2.5vh;
            letter-spacing: 0.4vw;
            border: 0.2vh solid rgba(255, 255, 255, 0.8);
            padding: 1vh 2vw;
            margin-bottom: 8vh;
            text-transform: uppercase;
        }

        .title-group {
            text-align: right;
            line-height: 1.1;
        }

        .the-art {
            font-size: 4vh;
            font-style: italic;
            display: block;
        }

        .the-art b {
            font-weight: normal;
            font-size: 5.5vh;
            font-style: normal;
        }

        .main-title {
            font-size: 6vh;
            display: block;
            margin-top: 1vh;
            font-weight: 400;
        }

        /* Зелёная полоса — фиксированная высота */
        .edition-bar {
            flex: 0 0 auto;
            background-color: var(--light-green);
            color: #333;
            height: 8vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5vw;
            font-size: 2.2vh;
            font-weight: bold;
            letter-spacing: 0.5vw;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Нижняя секция — прижимается к низу, высота по содержимому */
        .bottom-section {
            flex: 0 0 auto;
            background-color: var(--blue-bg);
            display: flex;
            justify-content: center;
            align-items: flex-end;    /* прижимаем логотип к низу секции */
            padding: 0 5vw 1vh 5vw;  /* отступы по бокам и небольшой снизу */
        }

        .footer-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .footer-logo img {
            width: 100%;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            /* Ограничиваем высоту, чтобы логотип не был слишком крупным на больших экранах */
            max-height: 15vh;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.2));
        }
    </style>
</head>
<body>

<div class="book-container">
    <div class="top-section">
        <div class="author-box">D. C. RAPAPORT</div>
        <div class="title-group">
            <span class="the-art">The <b>Art</b> of Molecular</span>
            <span class="main-title">Dynamics Simulation</span>
        </div>
    </div>

    <div class="edition-bar">
        Golden standart
    </div>

    <div class="bottom-section">
        <div class="footer-logo">
            <img src="https://qfoldit.github.io/img/1/logo/cambridgelogo.png"
                 alt="University of Cambridge logo">
        </div>
    </div>
</div>

</body>
</html>
