<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Art of Molecular Dynamics Simulation - Fullscreen</title>
    <style>
        :root {
            --blue-bg: #3a5ba0; /* Характерный синий цвет обложки */
            --light-green: #c1d72e;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Убираем прокрутку */
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--blue-bg);
        }

        .book-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Верхняя секция с текстом */
        .top-section {
            flex: 1; /* Занимает все свободное место до полосы */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Центрируем контент вертикально */
            align-items: flex-end;   /* Прижимаем текст к правому краю */
            padding: 5vw;            /* Адаптивные отступы */
            color: white;
        }

        .author-box {
            font-size: 2.5vh; /* Размер зависит от высоты экрана */
            letter-spacing: 0.4vw;
            border: 0.2vh solid rgba(255, 255, 255, 0.8);
            padding: 1vh 2vw;
            margin-bottom: 8vh;
            text-transform: uppercase;
        }

        .title-group {
            text-align: right;
            line-height: 1.1;
        }

        .the-art {
            font-size: 4vh;
            font-style: italic;
            display: block;
        }

        .the-art b {
            font-weight: normal;
            font-size: 5.5vh;
            font-style: normal;
        }

        .main-title {
            font-size: 6vh;
            display: block;
            margin-top: 1vh;
            font-weight: 400;
        }

        /* Зеленая разделительная полоса */
        .edition-bar {
            background-color: var(--light-green);
            color: #333;
            height: 8vh; /* Фиксированная доля высоты экрана */
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5vw;
            font-size: 2.2vh;
            font-weight: bold;
            letter-spacing: 0.5vw;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Нижняя секция (пустая, как вы просили) */
        .bottom-section {
            flex: 0.8; /* Нижняя часть теперь просто пустой фон */
            background-color: var(--blue-bg);
            /* Добавляем flex для позиционирования логотипа */
            display: flex;
            align-items: flex-end;    /* Прижимаем логотип к нижнему краю */
            justify-content: center;  /* Центрируем по горизонтали */
            padding: 0 5vw 2vh 5vw;  /* Отступы по бокам и снизу */
        }

        .footer-logo {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .footer-logo img {
            width: 100%;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            max-height: 12vh;        /* Ограничиваем высоту, чтобы не выходить за пределы */
        }
    </style>
</head>
<body>

<div class="book-container">
    <div class="top-section">
        <div class="author-box">D. C. RAPAPORT</div>
        
        <div class="title-group">
            <span class="the-art">The <b>Art</b> of Molecular</span>
            <span class="main-title">Dynamics Simulation</span>
        </div>
    </div>

    <div class="edition-bar">
        Second Edition
    </div>

    <div class="bottom-section">
        <div class="footer-logo">
            <img src="https://qfoldit.github.io/img/1/logo/cambridgelogo.png"
                 alt="University of Cambridge logo">
        </div>
    </div>
</div>

</body>
</html>
