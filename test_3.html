<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Art of Molecular Dynamics Simulation - Fullscreen</title>
    <style>
        :root {
            --blue-bg: #3a5ba0;
            --light-green: #c1d72e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--blue-bg);
        }

        .book-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .top-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 5vw;
            color: white;
            min-height: 0;
        }

        .author-box {
            font-size: 2.5vh;
            letter-spacing: 0.4vw;
            border: 0.2vh solid rgba(255, 255, 255, 0.8);
            padding: 1vh 2vw;
            margin-bottom: 8vh;
            text-transform: uppercase;
        }

        .title-group {
            text-align: right;
            line-height: 1.1;
        }

        .the-art {
            font-size: 4vh;
            font-style: italic;
            display: block;
        }

        .the-art b {
            font-weight: normal;
            font-size: 5.5vh;
            font-style: normal;
        }

        .main-title {
            font-size: 6vh;
            display: block;
            margin-top: 1vh;
            font-weight: 400;
        }

        .edition-bar {
            background-color: var(--light-green);
            color: #333;
            height: 8vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5vw;
            font-size: 2.2vh;
            font-weight: bold;
            letter-spacing: 0.5vw;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        /* Нижняя секция — фиксированная высота, чтобы гарантировать отсутствие выхода за границы */
        .bottom-section {
            height: 12vh;           /* фиксированная высота, не зависит от содержимого */
            flex-shrink: 0;
            background-color: var(--blue-bg);
            display: flex;
            align-items: flex-end;  /* прижимаем содержимое к низу */
            justify-content: center;
            padding: 0 5vw 1vh 5vw; /* отступы по бокам и небольшой снизу для воздуха */
        }

        .footer-logo {
            max-height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .footer-logo img {
            max-height: 100%;       /* картинка не выше 12vh */
            max-width: 100%;        /* не шире родителя с учётом отступов */
            width: auto;            /* сохраняем пропорции */
            height: auto;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

<div class="book-container">
    <div class="top-section">
        <div class="author-box">D. C. RAPAPORT</div>
        <div class="title-group">
            <span class="the-art">The <b>Art</b> of Molecular</span>
            <span class="main-title">Dynamics Simulation</span>
        </div>
    </div>

    <div class="edition-bar">
        Golden standart
    </div>

    <div class="bottom-section">
        <div class="footer-logo">
            <img src="https://qfoldit.github.io/img/1/logo/cambridgelogo.png"
                 alt="University of Cambridge logo">
        </div>
    </div>
</div>

</body>
</html>
