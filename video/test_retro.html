<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>qFoldIT // Retro Server Dashboard</title>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "three": "https://esm.sh/three@0.164.1",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?deps=react@18.2.0,react-dom@18.2.0,three@0.164.1"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050607;
      --panel:#07130f;
      --panel2:#0b1814;
      --line:#18ff8b;
      --line2:#74ffe4;
      --text:#d8ffe8;
      --muted:#6bbf8f;
      --warn:#ffb86b;
      --hot:#ff59d6;
      --blue:#7ab9ff;
    }
    *{box-sizing:border-box}
    html,body{
      width:100%;height:100%;margin:0;overflow:hidden;background:
      radial-gradient(circle at 50% 30%, rgba(24,255,139,.08), transparent 35%),
      linear-gradient(180deg, #020302 0%, #040706 45%, #010101 100%);
      color:var(--text);
      font-family:"VT323", monospace;
      -webkit-font-smoothing:none;
      -moz-osx-font-smoothing:auto;
      text-rendering:geometricPrecision;
      image-rendering:pixelated;
    } ::-webkit-ыскщддифк{width:0px;}
    #root{width:100%;height:100%}
    .shell{position:relative;width:100%;height:100%;overflow:hidden}
    .bg-canvas{position:absolute!important;inset:0;z-index:0;opacity:.95}
    .matrix-canvas,.scanlines,.vignette,.grain{pointer-events:none;position:absolute;inset:0;z-index:1}
    .matrix-canvas{opacity:.30;mix-blend-mode:screen}
    .scanlines{
      z-index:2;
      background:repeating-linear-gradient(to bottom, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 2px, transparent 4px);
      mix-blend-mode:screen;opacity:.2;animation:scanMove 10s linear infinite
    }
    .vignette{z-index:3;background:radial-gradient(circle at center, transparent 0%, rgba(0,0,0,.18) 58%, rgba(0,0,0,.62) 100%)}
    .grain{
      z-index:4;opacity:.12;
      background-image:radial-gradient(rgba(255,255,255,.45) 1px, transparent 1px), radial-gradient(rgba(0,0,0,.45) 1px, transparent 1px);
      background-position:0 0, 4px 4px;background-size:8px 8px;mix-blend-mode:overlay;animation:grainShift 1.4s steps(2) infinite
    }
    @keyframes scanMove{0%{transform:translateY(0)}100%{transform:translateY(4px)}}
    @keyframes grainShift{0%{transform:translate3d(0,0,0)}25%{transform:translate3d(-1px,1px,0)}50%{transform:translate3d(1px,-1px,0)}75%{transform:translate3d(2px,1px,0)}100%{transform:translate3d(0,0,0)}}
    .ui{
      position:relative;z-index:5;width:100%;height:100%;
      display:grid;grid-template-columns:288px 1fr;grid-template-rows:54px 1fr 30px;
      grid-template-areas:"top top" "side main" "foot foot"
    }
    .topbar,.sidebar,.panel,.footer,.chip,.button,.tab,.menu-item,.footer-link,.speaker,.burger,.pill,.code-shell,.ready-line,.scene-badge,.crt-caption,.status-bar{
      border:2px solid var(--line);
      background:linear-gradient(180deg, rgba(16,31,26,.96), rgba(5,10,8,.98));
      box-shadow:2px 2px 0 #000,inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .topbar{
      grid-area:top;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
      background:linear-gradient(180deg, rgba(9,18,14,.96), rgba(4,9,7,.86));border-bottom:2px solid rgba(24,255,139,.65);box-shadow:0 2px 0 #000;backdrop-filter:blur(3px)
    }
    .top-left,.top-right{display:flex;align-items:center;gap:10px;min-width:0}
    .brand{display:flex;flex-direction:column;line-height:1;gap:2px}
    .brand .title{font-family:"Press Start 2P", monospace;font-size:11px;color:var(--line);text-shadow:2px 2px 0 #000}
    .brand .subtitle{font-size:20px;color:var(--blue);text-shadow:1px 1px 0 #000}
    .chip,.button,.tab,.menu-item,.footer-link,.speaker,.burger{font-family:"Silkscreen","Press Start 2P",monospace;image-rendering:pixelated;image-rendering:crisp-edges;cursor:pointer;user-select:none;transition:transform .08s steps(2),filter .08s steps(2),border-color .08s steps(2)}
    .chip{padding:6px 8px;font-size:11px;white-space:nowrap;text-transform:uppercase}
    .chip.online{color:var(--line);animation:blink .9s steps(2) infinite}
    .chip.warn{color:var(--warn);border-color:var(--warn)}
    .chip.blue{color:var(--blue);border-color:var(--blue)}
    .hud-mini{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);white-space:nowrap}
    .hud-mini b{color:var(--text);font-family:"Press Start 2P", monospace;font-size:10px;text-transform:uppercase}
    .speaker,.burger{min-width:44px;padding:6px 10px;font-size:14px;text-align:center;color:var(--blue)}
    .burger{display:none;min-width:42px;min-height:38px;align-items:center;justify-content:center;color:var(--line);font-size:18px}
    .speaker:hover,.burger:hover,.button:hover,.tab:hover,.menu-item:hover,.footer-link:hover{transform:translate(-1px,-1px);filter:brightness(1.16);border-color:var(--line2)}
    
    /* Volume controls styling - replaces binary leds */
    .vol-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(5, 12, 9, 0.7);
      border: 1px solid rgba(24, 255, 139, 0.5);
      padding: 4px 10px;
      font-family: "Press Start 2P", monospace;
      font-size: 7px;
      backdrop-filter: blur(2px);
    }
    .vol-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--line2);
    }
    .vol-item label {
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .vol-slider {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      background: #0b2a1f;
      border: 1px solid var(--line);
      outline: none;
      cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 12px;
      background: var(--line);
      border: 1px solid #000;
      box-shadow: 1px 1px 0 #000;
      border-radius: 0;
      cursor: pointer;
    }
    .vol-slider::-moz-range-thumb {
      width: 8px;
      height: 12px;
      background: var(--line);
      border: 1px solid #000;
      border-radius: 0;
      cursor: pointer;
    }
    @media (max-width: 860px) {
      .vol-controls { gap: 6px; padding: 2px 6px; }
      .vol-slider { width: 55px; }
      .vol-item label { font-size: 6px; }
    }
    @media (max-width: 720px) {
      .vol-controls { display: none; } /* hide on very small to keep layout clean, but still functional via speaker? we keep anyway */
    }
    
    .sidebar{
      grid-area:side;position:relative;padding:12px;background:linear-gradient(180deg, rgba(6,14,11,.96), rgba(5,8,8,.90));
      border-right:2px solid rgba(24,255,139,.65);box-shadow:2px 0 0 #000;overflow-y:auto
    }
    .menu-head{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px dashed rgba(24,255,139,.45)}
    .menu-head .section{font-family:"Press Start 2P", monospace;font-size:10px;color:var(--line2);line-height:1.5}
    .menu-head .hint{font-size:17px;color:var(--muted)}
    .menu-list{display:flex;flex-direction:column;gap:10px}
    .menu-item{width:100%;text-align:left;padding:10px 10px;position:relative;overflow:hidden}
    .menu-item .kicker{font-family:"Press Start 2P", monospace;font-size:8px;color:var(--muted);margin-bottom:6px}
    .menu-item .label{display:flex;align-items:baseline;justify-content:space-between;gap:10px;font-size:22px;color:var(--text)}
    .menu-item .path{font-family:"Press Start 2P", monospace;font-size:8px;color:var(--blue);white-space:nowrap}
    .menu-item.active{border-color:var(--hot);box-shadow:0 0 0 2px rgba(255,89,214,.18),2px 2px 0 #000,inset 0 0 0 1px rgba(255,255,255,.03)}
    .menu-item.active::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg, rgba(255,89,214,.12), transparent 55%);pointer-events:none}
    .menu-footer{margin-top:14px;padding-top:10px;border-top:2px dashed rgba(24,255,139,.35);color:var(--muted);font-size:16px;line-height:1.2}
    .main{grid-area:main;position:relative;padding:14px;overflow:hidden}
    .main-grid{display:grid;grid-template-columns:minmax(360px,1.2fr) minmax(340px,.9fr);grid-template-rows:1fr auto;gap:14px;width:100%;height:100%}
    .hero{position:relative;min-height:0;border:2px solid var(--line);background:linear-gradient(180deg, rgba(4,10,8,.74), rgba(6,12,10,.94));box-shadow:2px 2px 0 #000,inset 0 0 0 1px rgba(255,255,255,.03);overflow:hidden}
    .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%, rgba(24,255,139,.10), transparent 40%),radial-gradient(circle at 70% 30%, rgba(122,185,255,.08), transparent 26%),radial-gradient(circle at 30% 70%, rgba(255,89,214,.06), transparent 28%);pointer-events:none;z-index:0}
    .scene-wrap{position:absolute;inset:0;z-index:1}
    .hero-ui{position:absolute;inset:10px;z-index:2;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
    .ready-line{align-self:flex-start;display:inline-flex;align-items:center;gap:10px;padding:6px 10px;border-color:rgba(122,185,255,.9);background:rgba(5,10,8,.75);box-shadow:2px 2px 0 #000;color:var(--line2);font-family:"Press Start 2P", monospace;font-size:10px;text-shadow:1px 1px 0 #000}
    .cursor{display:inline-block;width:10px;height:14px;background:var(--line);margin-left:4px;animation:blink 1s steps(2) infinite;vertical-align:middle}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.2}}
    .crt-caption{align-self:flex-start;max-width:560px;margin-top:auto;padding:8px 10px;border-color:rgba(24,255,139,.75);background:rgba(4,10,8,.72);box-shadow:2px 2px 0 #000;font-size:21px;line-height:.95;color:var(--text);text-shadow:1px 1px 0 #000}
    .crt-caption .small{display:block;margin-top:4px;font-size:16px;color:var(--muted)}
    .scene-badge{align-self:flex-end;display:inline-flex;align-items:center;gap:8px;padding:5px 8px;border-color:rgba(255,89,214,.82);background:rgba(10,8,15,.78);box-shadow:2px 2px 0 #000;font-family:"Press Start 2P", monospace;font-size:8px;color:#f8b7ff;text-shadow:1px 1px 0 #000}
    .panel{min-height:0;border-color:rgba(122,185,255,.68);background:linear-gradient(180deg, rgba(8,16,14,.96), rgba(6,9,10,.96));box-shadow:2px 2px 0 #000,inset 0 0 0 1px rgba(255,255,255,.03);overflow:hidden}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;border-bottom:2px solid rgba(122,185,255,.45);background:linear-gradient(180deg, rgba(10,18,16,.92), rgba(7,12,10,.96))}
    .panel-title{display:flex;flex-direction:column;gap:4px}
    .panel-title .name{font-family:"Press Start 2P", monospace;font-size:10px;color:var(--line2);line-height:1.3}
    .panel-title .desc{font-size:18px;color:var(--muted);line-height:1}
    .meta{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:8px}
    .card-body{padding:12px;display:grid;grid-template-columns:1fr;gap:12px;height:calc(100% - 58px);overflow:hidden}
    .tabs{display:flex;flex-wrap:wrap;gap:8px}
    .tab{padding:8px 10px;font-size:14px;color:var(--muted)}
    .tab.active{color:#fff;border-color:var(--hot);background:linear-gradient(180deg, rgba(42,12,33,.95), rgba(12,8,16,.95))}
    .api-grid{display:grid;grid-template-columns:1fr;gap:12px;overflow:hidden;min-height:0}
    .endpoint-box{display:grid;grid-template-columns:1fr;gap:10px;min-height:0;overflow:auto;padding-right:2px}
    .endpoint-top{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
    .endpoint-title{display:flex;flex-direction:column;gap:6px}
    .endpoint-title h2{margin:0;font-size:26px;color:var(--text);line-height:.95}
    .endpoint-title p{margin:0;font-size:20px;color:var(--muted);line-height:1}
    .pill-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:flex-start}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 8px;border-color:rgba(24,255,139,.65);background:rgba(8,16,14,.9);box-shadow:2px 2px 0 #000;font-family:"Press Start 2P", monospace;font-size:8px;color:var(--line)}
    .pill.blue{border-color:rgba(122,185,255,.7);color:var(--blue)}
    .pill.hot{border-color:rgba(255,89,214,.7);color:#ff9ded}
    .pill.warn{border-color:rgba(255,184,107,.75);color:var(--warn)}
    .code-shell{border-color:rgba(24,255,139,.6);background:#020504;box-shadow:2px 2px 0 #000;overflow:hidden}
    .code-shell .head{padding:6px 8px;border-bottom:2px solid rgba(24,255,139,.35);display:flex;justify-content:space-between;align-items:center;gap:6px;font-family:"Press Start 2P", monospace;font-size:8px;color:var(--line2)}
    pre{margin:0;padding:10px 10px 12px;font-size:19px;line-height:1.03;color:#c9ffe2;overflow:auto;white-space:pre-wrap;word-break:break-word;max-height:240px;text-shadow:1px 1px 0 #000}
    .actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}
    .button{padding:10px 12px;font-size:14px;color:#fff;border-color:var(--warn);background:linear-gradient(180deg, rgba(38,24,8,.98), rgba(10,8,5,.98))}
    .button.primary{border-color:var(--line);color:var(--line)}
    .button.danger{border-color:var(--hot);color:#ffbcf0}
    .button:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .terminal{display:grid;grid-template-rows:auto 1fr;min-height:0;overflow:hidden}
    .terminal-log{min-height:0;overflow:auto;padding:10px 12px 12px;font-size:18px;line-height:1.12;color:#d9ffe8;background:linear-gradient(180deg, rgba(2,8,5,.96), rgba(2,6,5,.98))}
    .line{margin:0 0 4px 0;white-space:pre-wrap;word-break:break-word}
    .line .prompt{color:var(--line)}
    .line .ok{color:var(--line2)}
    .line .warn{color:var(--warn)}
    .line .hot{color:var(--hot)}
    .status-bar{padding:8px 12px;border-top:2px solid rgba(24,255,139,.35);display:flex;justify-content:space-between;gap:8px;align-items:center;background:rgba(6,10,8,.98);font-family:"Press Start 2P", monospace;font-size:8px;color:var(--muted);text-transform:uppercase}
    .status-bar .glow{color:var(--line);animation:blink 1s steps(2) infinite}
    .footer{
      grid-area:foot;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 12px;
      background:linear-gradient(180deg, rgba(5,10,8,.9), rgba(2,4,4,.98));border-top:2px solid rgba(24,255,139,.42);box-shadow:0 -2px 0 #000;
      font-size:16px;color:var(--muted)
    }
    .footer-links{display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0}
    .footer-link{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;text-decoration:none;color:var(--text);font-size:12px}
    .tiny{font-family:"Press Start 2P", monospace;font-size:8px;color:var(--blue)}
    .sep{width:1px;height:18px;background:rgba(24,255,139,.35)}
    .loader-line{display:flex;align-items:center;gap:8px;font-family:"Press Start 2P", monospace;font-size:8px;color:var(--line2);margin-top:8px}
    .loader{width:120px;height:10px;border:2px solid var(--line);background:#04110b;position:relative;box-shadow:2px 2px 0 #000;overflow:hidden}
    .loader::before{content:"";position:absolute;inset:0;width:var(--load,0%);background:repeating-linear-gradient(90deg, var(--line) 0px, var(--line) 8px, #05100c 8px, #05100c 10px);transition:width .25s steps(4)}
    .drawer-backdrop{display:none}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
    .legend span{font-family:"Press Start 2P", monospace;font-size:8px;color:var(--muted);padding:4px 6px;border:1px solid rgba(122,185,255,.35);background:rgba(6,10,8,.8)}
    .mono{font-family:"Press Start 2P", monospace;font-size:8px;letter-spacing:.3px}
    @media (max-width:1080px){
      .ui{grid-template-columns:1fr;grid-template-areas:"top" "main" "foot"}
      .sidebar{position:fixed;top:54px;left:0;bottom:30px;width:min(86vw,320px);transform:translateX(-105%);transition:transform .18s steps(3);z-index:20}
      .sidebar.open{transform:translateX(0)}
      .drawer-backdrop{display:block;position:fixed;inset:54px 0 30px 0;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;z-index:19;transition:opacity .12s steps(2)}
      .drawer-backdrop.open{opacity:1;pointer-events:auto}
      .burger{display:inline-flex}
      .main{padding:10px}
      .main-grid{grid-template-columns:1fr;grid-template-rows:48vh auto auto}
      .hero{min-height:300px}
      .endpoint-top{grid-template-columns:1fr}
      .pill-row,.actions{justify-content:flex-start}
      .footer{font-size:14px}
    }
    @media (max-width:720px){
      .brand .title{font-size:9px}
      .brand .subtitle{font-size:16px}
      .hud-mini{display:none}
      .chip,.speaker{font-size:9px}
      .panel-title .name{font-size:8px}
      .panel-title .desc,.menu-head .hint,.crt-caption,pre,.terminal-log,.footer{font-size:15px}
      .endpoint-title h2{font-size:22px}
      .endpoint-title p{font-size:16px}
      .card-body{padding:10px}
      .vol-controls{ display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  import React, { useEffect, useMemo, useRef, useState } from "react";
  import { createRoot } from "react-dom/client";
  import { Canvas, useFrame } from "@react-three/fiber";
  import * as THREE from "three";

  const h = React.createElement;
  const { Fragment } = React;

  const API = {
    fold: {
      key: "fold",
      name: "Quantum Folding",
      path: "/fold",
      method: "POST",
      kicker: "Simulate lattice folds",
      title: "Quantum Folding /fold",
      description: "Queue a quantum folding job and receive a retro-styled lattice simulation ticket.",
      note: "Best for protein-like and abstract quantum folding demos.",
      request: { sequence: "AUGCGAUCUUAGGA", precision: "ultra", iterations: 128, seed: "8BIT-01" },
      response: { ok: true, jobId: "QF-8B7A-01", state: "queued", etaMs: 4800, energy: "-128.44" }
    },
    design: {
      key: "design",
      name: "Molecule Design",
      path: "/design",
      method: "POST",
      kicker: "Construct molecular shapes",
      title: "Molecule Design /design",
      description: "Propose a molecule, validate constraints, and produce a synthetic build response.",
      note: "Use this for scaffold generation and molecule proposals.",
      request: { target: "binding-pocket-07", scaffold: "C7H8N2O2", constraints: ["stable", "compact", "low-toxicity"], style: "arcade" },
      response: { ok: true, designId: "MD-15F0-09", score: 0.92, state: "validated", atoms: 42 }
    },
    oilgas: {
      key: "oilgas",
      name: "Oil & Gas",
      path: "/oilgas",
      method: "GET",
      kicker: "Telemetry and scan endpoints",
      title: "Oil & Gas /oilgas",
      description: "Fetch field telemetry, production signals, and extraction dashboards from a fossil-style data feed.",
      note: "GET demo with query-style payload.",
      request: { field: "delta-rig-3", window: "24h", mode: "scan", detail: "binary" },
      response: { ok: true, telemetryId: "OG-3A9C-77", barrelsPerDay: 4821, pressure: 91.3, status: "nominal" }
    },
    mining: {
      key: "mining",
      name: "Gold Mining",
      path: "/mining",
      method: "GET",
      kicker: "Ore extraction intelligence",
      title: "Gold Mining /mining",
      description: "Inspect ore yields, shaft status, and claim telemetry with an 8-bit gold rush vibe.",
      note: "GET demo with scanned resource data.",
      request: { site: "auric-12", depth: "2.4km", richness: "high", ore: "gold" },
      response: { ok: true, mineId: "GM-0FAD-22", yieldKg: 18.7, purity: "94%", status: "digging" }
    },
    ai: {
      key: "ai",
      name: "AI Screening",
      path: "/ai",
      method: "POST",
      kicker: "Batch scoring engine",
      title: "AI Screening /ai",
      description: "Submit candidates to an AI screening queue and get a stylized approval forecast.",
      note: "POST demo for screening and scoring.",
      request: { candidateId: "CAND-448", features: ["shape", "charge", "compatibility"], threshold: 0.67, mode: "screen" },
      response: { ok: true, screeningId: "AI-22C1-88", score: 0.74, verdict: "pass", latencyMs: 498 }
    },
    userEconomy: {
      key: "userEconomy",
      name: "User & Economy",
      path: "/user, /economy",
      method: "GET",
      kicker: "Profiles and ledger",
      title: "User & Economy",
      description: "Switch between profile and economy sub-endpoints to inspect identity and economy snapshots.",
      note: "Two public endpoints grouped under one category.",
      endpoints: [
        {
          path: "/user",
          method: "GET",
          title: "User Profile /user",
          description: "Fetch user profile data, stats, and access state.",
          request: { userId: "USR-042", includeStats: true, mode: "retro" },
          response: { ok: true, userId: "USR-042", rank: "captain", credits: 7800, status: "active" }
        },
        {
          path: "/economy",
          method: "GET",
          title: "Economy Snapshot /economy",
          description: "Read the economy ledger, markets, and balances.",
          request: { ledger: "arcade", period: "24h", includeRates: true },
          response: { ok: true, marketIndex: 1.84, supply: 23040, demand: 0.72, status: "balanced" }
        }
      ]
    }
  };

  const MENU = [API.fold, API.design, API.oilgas, API.mining, API.ai, API.userEconomy];

  function safePretty(value) {
    return JSON.stringify(value, null, 2);
  }
  function clamp(n, a, b) {
    return Math.max(a, Math.min(b, n));
  }

  function BinaryMatrix() {
    const ref = useRef(null);

    useEffect(() => {
      const canvas = ref.current;
      const ctx = canvas.getContext("2d");
      const fontSize = 18;
      const chars = ["0", "1"];
      let cols = 0;
      let drops = [];
      let raf = 0;
      let frame = 0;

      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cols = Math.max(1, Math.floor(window.innerWidth / fontSize));
        drops = new Array(cols).fill(0).map(() => Math.random() * (window.innerHeight / fontSize));
      };

      const draw = () => {
        frame++;
        ctx.fillStyle = "rgba(0,0,0,0.11)";
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.font = `${fontSize}px monospace`;

        for (let i = 0; i < cols; i++) {
          const x = i * fontSize;
          const y = drops[i] * fontSize;
          const char = chars[(i + frame) % 2];
          const alpha = 0.18 + ((i + frame) % 10) / 16;
          ctx.fillStyle = `rgba(24,255,139,${alpha})`;
          ctx.fillText(char, x, y);
          if (y > window.innerHeight && Math.random() > 0.985) drops[i] = 0;
          drops[i] += 0.56 + (i % 5) * 0.03;
        }
        raf = requestAnimationFrame(draw);
      };

      resize();
      draw();
      window.addEventListener("resize", resize);
      return () => {
        window.removeEventListener("resize", resize);
        cancelAnimationFrame(raf);
      };
    }, []);

    return h("canvas", { ref, className: "matrix-canvas" });
  }

  function RetroCloud() {
    const group = useRef();
    const core = useRef();
    const ring = useRef();

    const nodes = useMemo(() => {
      const items = [];
      const total = 12;
      for (let i = 0; i < total; i++) {
        const angle = (i / total) * Math.PI * 2;
        const radius = 2.4 + (i % 3) * 0.3;
        items.push({
          x: Math.cos(angle) * radius,
          y: Math.sin(angle * 2) * 0.7,
          z: Math.sin(angle) * radius,
          scale: 0.5 + (i % 4) * 0.12,
          type: i % 3
        });
      }
      return items;
    }, []);

    useFrame(({ camera, clock }) => {
      const t = clock.getElapsedTime();
      if (group.current) {
        group.current.rotation.y = t * 0.18;
        group.current.rotation.x = Math.sin(t * 0.2) * 0.1;
      }
      if (core.current) {
        core.current.rotation.x = t * 0.6;
        core.current.rotation.y = t * 0.45;
      }
      if (ring.current) {
        ring.current.rotation.z = -t * 0.22;
      }
      camera.position.set(Math.sin(t * 0.16) * 5.5, 2.2 + Math.sin(t * 0.22) * 0.45, Math.cos(t * 0.16) * 5.5);
      camera.lookAt(0, 0, 0);
    });

    return h(Fragment, null,
      h("color", { attach: "background", args: ["#020403"] }),
      h("fog", { attach: "fog", args: ["#020403", 7, 20] }),
      h("ambientLight", { intensity: 0.32 }),
      h("directionalLight", { position: [5, 8, 5], intensity: 1.1, color: "#7ab9ff" }),
      h("directionalLight", { position: [-6, 2, -2], intensity: 0.7, color: "#18ff8b" }),
      h("pointLight", { position: [0, 0, 0], intensity: 1.8, color: "#ff59d6", distance: 12 }),
      h("gridHelper", { args: [22, 22, "#18ff8b", "#0b3c2b"], position: [0, -2.1, 0] }),
      h("group", { ref: group },
        h("group", { ref: ring },
          ...nodes.map((n, i) =>
            h("mesh", { key: i, position: [n.x, n.y, n.z], scale: n.scale, rotation: [i * 0.25, i * 0.4, i * 0.1] },
              n.type === 0 ? h("boxGeometry", { args: [1, 1, 1] }) :
              n.type === 1 ? h("icosahedronGeometry", { args: [0.9, 0] }) :
                             h("sphereGeometry", { args: [0.8, 6, 6] }),
              h("meshStandardMaterial", { color: i % 2 === 0 ? "#7ab9ff" : "#18ff8b", flatShading: true, roughness: 1, metalness: 0.02 })
            )
          )
        ),
        h("mesh", { ref: core },
          h("icosahedronGeometry", { args: [1.3, 0] }),
          h("meshStandardMaterial", { color: "#ff59d6", flatShading: true, roughness: 1, metalness: 0.05 })
        ),
        h("mesh", { position: [0, 0, 0.1] },
          h("torusGeometry", { args: [2.3, 0.08, 5, 14] }),
          h("meshStandardMaterial", { color: "#74ffe4", flatShading: true, roughness: 1, metalness: 0.02 })
        )
      ),
      h("mesh", { position: [0, -2.0, 0], rotation: [-Math.PI / 2, 0, 0] },
        h("planeGeometry", { args: [30, 30, 1, 1] }),
        h("meshBasicMaterial", { color: "#08110d", wireframe: true, opacity: 0.25, transparent: true })
      )
    );
  }

  function ThreeScene() {
    return h(Canvas, {
      className: "bg-canvas",
      dpr: [1, 1.25],
      gl: { antialias: false, alpha: true, powerPreference: "high-performance" },
      camera: { position: [5, 2.2, 5], fov: 48, near: 0.1, far: 100 }
    }, h(RetroCloud));
  }

  function App() {
    const [activeKey, setActiveKey] = useState("fold");
    const [activeSub, setActiveSub] = useState(0);
    const [menuOpen, setMenuOpen] = useState(true);
    const [soundOn, setSoundOn] = useState(true);
    const [requestCount, setRequestCount] = useState(128);
    const [loadPct, setLoadPct] = useState(34);
    const [bootText, setBootText] = useState("");
    const [logs, setLogs] = useState([
      { text: "[BOOT] Awaiting user input...", kind: "ok" },
      { text: "[SYS] Matrix renderer initialized.", kind: "ok" },
      { text: "[SYS] Demo API navigation ready.", kind: "ok" }
    ]);
    const [pending, setPending] = useState(true);
    const [musicVolume, setMusicVolume] = useState(0.5);
    const [sfxVolume, setSfxVolume] = useState(1.0);
    const logRef = useRef(null);
    const audioRef = useRef(null);
    const musicRef = useRef(null);
    const musicStarted = useRef(false);
    const soundRef = useRef(soundOn);
    soundRef.current = soundOn;

    const active = MENU.find((m) => m.key === activeKey);
    const selected = active && active.endpoints ? active.endpoints[activeSub] : active;

    const ensureAudio = async () => {
      if (!audioRef.current) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioRef.current = new AC();
      }
      if (audioRef.current.state === "suspended") {
        try { await audioRef.current.resume(); } catch (_) {}
      }
      return audioRef.current;
    };

    // Background music setup
    useEffect(() => {
      const audio = new Audio("https://qfoldit.github.io/assets/audio/CarrionOST.mp3");
      audio.loop = true;
      audio.preload = "auto";
      musicRef.current = audio;
      return () => {
        if (musicRef.current) {
          musicRef.current.pause();
          musicRef.current.src = "";
        }
      };
    }, []);

    const startMusicOnInteraction = async () => {
      if (musicStarted.current) return;
      if (!musicRef.current) return;
      try {
        await musicRef.current.play();
        musicStarted.current = true;
        if (soundOn) {
          musicRef.current.volume = musicVolume;
        } else {
          musicRef.current.volume = 0;
        }
      } catch (e) { console.warn("music autoplay blocked", e); }
    };

    // update music volume based on soundOn and musicVolume
    useEffect(() => {
      if (musicRef.current) {
        musicRef.current.volume = soundOn ? musicVolume : 0;
      }
    }, [musicVolume, soundOn]);

    // SFX volume multiplier (all ping gains are multiplied by sfxVolume)
    const ping = async ({ freq = 480, duration = 0.06, type = "square", gain = 0.054, slide = 0 }) => {
      if (!soundRef.current) return;
      const ctx = await ensureAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq + slide), now + duration);
      const finalGain = gain * sfxVolume;
      amp.gain.setValueAtTime(0.0003, now);
      amp.gain.exponentialRampToValueAtTime(finalGain, now + 0.008);
      amp.gain.exponentialRampToValueAtTime(0.0003, now + duration);
      osc.connect(amp);
      amp.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration);
    };

    const playBootChime = async () => {
      const ctx = await ensureAudio();
      if (!ctx || !soundRef.current) return;
      const notes = [261.63, 329.63, 392.0, 523.25];
      notes.forEach((f, idx) => {
        const t = ctx.currentTime + idx * 0.08;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "square";
        o.frequency.value = f;
        const gainVal = 0.084 * sfxVolume;
        g.gain.value = 0.00225;
        g.gain.exponentialRampToValueAtTime(gainVal, t + 0.09);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(t);
        o.stop(t + 0.1);
      });
    };

    const logLine = (text, kind = "ok") => {
      setLogs((prev) => [...prev, { text, kind, ts: Date.now() }].slice(-120));
    };

    const onToggleSound = async () => {
      const next = !soundOn;
      setSoundOn(next);
      if (next) {
        await ensureAudio();
        await playBootChime();
        if (musicRef.current && musicStarted.current) musicRef.current.volume = musicVolume;
        logLine("[AUDIO] Interface sound enabled.", "ok");
      } else {
        if (musicRef.current) musicRef.current.volume = 0;
        logLine("[AUDIO] Interface sound muted.", "warn");
      }
    };

    const onTryIt = async () => {
      if (pending) return;
      setPending(true);
      setRequestCount((v) => v + 1);
      setLoadPct((v) => clamp(v + 7, 12, 96));
      await ping({ freq: 620, duration: 0.05, gain: 0.36, type: "square" });

      const endpoint = selected.path || (selected.endpoints ? selected.endpoints[activeSub].path : "/");
      const method = selected.method || (selected.endpoints ? selected.endpoints[activeSub].method : "GET");
      logLine(`[TX] Request sent to ${endpoint} ...`, "warn");
      console.log(`Request sent to ${endpoint}`);

      setTimeout(async () => {
        setPending(false);
        setRequestCount((v) => v + 1);
        setLoadPct((v) => clamp(v - 2, 10, 92));
        logLine(`[RX] ${method} ${endpoint} → 200 OK // demo response generated`, "ok");
        logLine(`[SYS] payload=${JSON.stringify(selected.request).slice(0, 70)}...`, "ok");
        await ping({ freq: 880, duration: 0.08, gain: 0.405, type: "triangle", slide: 70 });
      }, 500);
    };

    useEffect(() => {
      const text = "qFoldIT SERVER v1.0 READY";
      let i = 0;
      setBootText("");
      const timer = setInterval(() => {
        i += 1;
        setBootText(text.slice(0, i));
        if (i >= text.length) clearInterval(timer);
      }, 55);
      return () => clearInterval(timer);
    }, []);

    useEffect(() => {
      const el = logRef.current;
      if (el) el.scrollTop = el.scrollHeight;
    }, [logs]);

    useEffect(() => {
      const onKey = (e) => { if (e.key === "Escape") setMenuOpen(false); };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, []);

    useEffect(() => {
      const interval = setInterval(() => {
        setLoadPct((v) => clamp(Math.round(v + (Math.random() * 12 - 6) * 0.12), 8, 96));
      }, 1600);
      return () => clearInterval(interval);
    }, []);

    const bits = useMemo(() => requestCount.toString(2).padStart(8, "0").slice(-8).split(""), [requestCount]);

    const requestView = selected.endpoints ? selected.endpoints[activeSub].request : selected.request;
    const responseView = selected.endpoints ? selected.endpoints[activeSub].response : selected.response;
    const pathView = selected.endpoints ? selected.endpoints[activeSub].path : selected.path;
    const methodView = selected.endpoints ? selected.endpoints[activeSub].method : selected.method;
    const titleView = selected.endpoints ? selected.endpoints[activeSub].title : selected.title;
    const descView = selected.endpoints ? selected.endpoints[activeSub].description : selected.description;

    const handleMusicVolume = (e) => {
      const val = parseFloat(e.target.value);
      setMusicVolume(val);
    };
    const handleSfxVolume = (e) => {
      const val = parseFloat(e.target.value);
      setSfxVolume(val);
    };

    return h("div", { className: "shell", onPointerDown: () => { if (soundOn) ensureAudio(); startMusicOnInteraction(); } },
      h(BinaryMatrix),
      h(ThreeScene),
      h("div", { className: "scanlines" }),
      h("div", { className: "grain" }),
      h("div", { className: "vignette" }),
      h("div", { className: `drawer-backdrop ${menuOpen ? "open" : ""}`, onClick: () => setMenuOpen(false) }),
      h("div", { className: "ui" },
        h("header", { className: "topbar" },
          h("div", { className: "top-left" },
            h("button", { className: "burger", onClick: () => setMenuOpen(v => !v), "aria-label": "Menu" }, "☰"),
            h("div", { className: "brand" },
              h("div", { className: "title" }, "qFOLDIT // RETRO SERVER"),
              h("div", { className: "subtitle" }, bootText, h("span", { className: "cursor" }))
            )
          ),
          h("div", { className: "top-right" },
            h("div", { className: "hud-mini" },
              h("span", null, h("b", null, "REQ"), " ", String(requestCount).padStart(4, "0")),
              h("span", { className: "sep" }),
              h("span", null, h("b", null, "LOAD"), " ", loadPct, "%"),
              h("span", { className: "sep" }),
              h("span", null, h("b", null, "BIN"), " ", bits.join(""))
            ),
            // Replaced binary leds with volume controls
            h("div", { className: "vol-controls" },
              h("div", { className: "vol-item" },
                h("label", null, "MUSIC"),
                h("input", { type: "range", min: 0, max: 1, step: 0.01, value: musicVolume, onChange: handleMusicVolume, className: "vol-slider" })
              ),
              h("div", { className: "vol-item" },
                h("label", null, "SFX"),
                h("input", { type: "range", min: 0, max: 1, step: 0.01, value: sfxVolume, onChange: handleSfxVolume, className: "vol-slider" })
              )
            ),
            h("div", { className: "chip online" }, "SERVER STATUS: ONLINE"),
            h("button", { className: "speaker", onClick: onToggleSound, onMouseEnter: () => soundOn && ping({ freq: 760, duration: 0.03, gain: 0.225, type: "square" }) }, soundOn ? "SND:ON" : "SND:OFF")
          )
        ),

        h("aside", { className: `sidebar ${menuOpen ? "open" : ""}` },
          h("div", { className: "menu-head" },
            h("div", { className: "section" }, "API NAVIGATION MATRIX"),
            h("div", { className: "hint" }, "Select a public category and run a demo request.")
          ),
          h("div", { className: "menu-list" },
            ...MENU.map((item) => h("button", {
              key: item.key,
              className: `menu-item ${activeKey === item.key ? "active" : ""}`,
              onClick: () => {
                setActiveKey(item.key);
                setActiveSub(0);
                setMenuOpen(false);
                logLine(`[NAV] Focused ${item.path}`, "ok");
                ping({ freq: 520, duration: 0.035, gain: 0.27, type: "square", slide: 45 });
                startMusicOnInteraction();
              },
              onMouseEnter: () => soundOn && ping({ freq: 300 + Math.random() * 80, duration: 0.025, gain: 0.1575, type: "triangle" })
            },
              h("div", { className: "kicker" }, item.kicker),
              h("div", { className: "label" }, h("span", null, item.name), h("span", { className: "path" }, item.path))
            ))
          ),
          h("div", { className: "menu-footer" },
            h("div", { className: "mono" }, "CRT // low-poly // pixel audio // binary UI"),
            h("div", { className: "legend" }, h("span", null, "0/1 MATRIX"), h("span", null, "RETRO RENDER"), h("span", null, "DEMO MODE"))
          )
        ),

        h("main", { className: "main" },
          h("div", { className: "main-grid" },
            h("section", { className: "hero" },
              h("div", { className: "scene-wrap" }),
              h("div", { className: "hero-ui" },
                h("div", { className: "ready-line" }, h("span", null, "BOOT:"), h("span", null, bootText || "..."), h("span", { className: "cursor" })),
                h("div", { className: "scene-badge" }, h("span", null, "R3F"), h("span", null, "LOW-POLY CORE ACTIVE")),
                h("div", { className: "crt-caption" },
                  "qFoldIT dashboard emulates a cartridge-era control panel.",
                  h("span", { className: "small" }, "Noise, scanlines, binary counters and a moving 3D cluster sit behind the API navigator.")
                )
              )
            ),

            h("section", { className: "panel" },
              h("div", { className: "panel-head" },
                h("div", { className: "panel-title" },
                  h("div", { className: "name" }, titleView),
                  h("div", { className: "desc" }, descView)
                ),
                h("div", { className: "meta" },
                  h("span", { className: "pill blue" }, methodView),
                  h("span", { className: "pill" }, pathView || "/user, /economy"),
                  h("span", { className: "pill hot" }, "v1 DEMO")
                )
              ),
              h("div", { className: "card-body" },
                selected.endpoints ? h("div", { className: "tabs" },
                  ...selected.endpoints.map((ep, idx) => h("button", {
                    key: ep.path,
                    className: `tab ${activeSub === idx ? "active" : ""}`,
                    onClick: () => {
                      setActiveSub(idx);
                      logLine(`[NAV] Switched to ${ep.path}`, "ok");
                      ping({ freq: 430 + idx * 110, duration: 0.03, gain: 0.225, type: "square" });
                      startMusicOnInteraction();
                    },
                    onMouseEnter: () => soundOn && ping({ freq: 280 + idx * 60, duration: 0.02, gain: 0.135, type: "triangle" })
                  }, ep.path))
                ) : null,

                h("div", { className: "api-grid" },
                  h("div", { className: "endpoint-box" },
                    h("div", { className: "endpoint-top" },
                      h("div", { className: "endpoint-title" },
                        h("h2", null, titleView),
                        h("p", null, descView)
                      ),
                      h("div", { className: "pill-row" },
                        h("span", { className: "pill warn" }, methodView),
                        h("span", { className: "pill blue" }, pathView),
                        h("span", { className: "pill" }, pending ? "STATUS: SENDING" : "STATUS: IDLE")
                      )
                    ),

                    h("div", { className: "code-shell" },
                      h("div", { className: "head" }, h("span", null, "JSON REQUEST"), h("span", null, pathView)),
                      h("pre", null, safePretty(requestView))
                    ),

                    h("div", { className: "code-shell" },
                      h("div", { className: "head" }, h("span", null, "JSON RESPONSE"), h("span", null, "MOCK")),
                      h("pre", null, safePretty(responseView))
                    ),

                    h("div", { className: "actions" },
                      h("button", { className: "button primary", onClick: onTryIt, onMouseEnter: () => soundOn && ping({ freq: 680, duration: 0.02, gain: 0.18, type: "triangle" }), disabled: pending }, pending ? "SENDING..." : "TRY IT"),
                      h("button", {
                        className: "button",
                        onClick: () => {
                          logLine(`[SYS] Clipboard-ready demo payload refreshed for ${pathView}`, "ok");
                          setLoadPct(v => clamp(v + 4, 10, 96));
                          ping({ freq: 560, duration: 0.04, gain: 0.135, type: "square" });
                          startMusicOnInteraction();
                        },
                        onMouseEnter: () => soundOn && ping({ freq: 360, duration: 0.02, gain: 0.135, type: "triangle" })
                      }, "REFRESH SAMPLE"),
                      h("button", {
                        className: "button danger",
                        onClick: () => {
                          setLogs([{ text: "[SYS] Terminal cleared.", kind: "ok" }, { text: "[BOOT] Awaiting user input...", kind: "ok" }]);
                          logLine("[SYS] Log reset complete.", "ok");
                          ping({ freq: 240, duration: 0.05, gain: 0.315, type: "square", slide: -30 });
                        }
                      }, "CLEAR LOG")
                    )
                  ),

                  h("div", { className: "terminal panel" },
                    h("div", { className: "panel-head" },
                      h("div", { className: "panel-title" },
                        h("div", { className: "name" }, "TERMINAL LOG"),
                        h("div", { className: "desc" }, "Request queue, mock status and interface telemetry.")
                      ),
                      h("div", { className: "meta" },
                        h("span", { className: "chip blue" }, "API v1"),
                        h("span", { className: "chip warn" }, pending ? "PROCESSING" : "READY")
                      )
                    ),
                    h("div", { className: "terminal-log", ref: logRef },
                      ...logs.map((row, idx) => h("p", { className: "line", key: idx },
                        h("span", { className: "prompt" }, "> "),
                        h("span", { className: row.kind === "warn" ? "warn" : row.kind === "hot" ? "hot" : "ok" }, row.text)
                      ))
                    ),
                    h("div", { className: "status-bar" }, h("span", null, "RENDER: CRT"), h("span", { className: "glow" }, "ONLINE"), h("span", null, "MODE: DEMO"))
                  )
                )
              )
            )
          )
        ),

        h("footer", { className: "footer" },
          h("div", { className: "footer-links" },
            h("a", { className: "footer-link", href: "https://github.com/qFoldIT", target: "_blank", rel: "noreferrer" }, h("span", null, "GITHUB"), h("span", { className: "tiny" }, "qFoldIT")),
            h("span", { className: "sep" }),
            h("span", { className: "footer-link", style: { pointerEvents: "none" } }, h("span", null, "API"), h("span", { className: "tiny" }, "v1")),
            h("span", { className: "sep" }),
            h("span", { className: "footer-link", style: { pointerEvents: "none" } }, h("span", null, "SOUND"), h("span", { className: "tiny" }, soundOn ? "UNMUTE" : "MUTE"))
          ),
          h("div", { className: "tiny" }, "qFoldIT // RETRO UI // React + Three.js + R3F")
        )
      )
    );
  }

  createRoot(document.getElementById("root")).render(h(App));
</script>
