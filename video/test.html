<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Octopus Interface</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: sans-serif;
    overflow-x: hidden;
}

/* --- HEADER LINE --- */
.top-bar {
    position: fixed;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
}

/* Общий контейнер для иконок */
.icon-box {
    height: 64px;
    display: flex;
    align-items: center;
}

/* Иконки */
.icon-box img {
    height: 100%;
    width: auto;
    object-fit: contain;
    transition: transform 0.2s ease;
}

.icon-box img:hover {
    transform: scale(1.05);
}

/* Центральный логотип */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 30;
}

.center-logo img {
    width: 80px;
    opacity: 0.9;
    transition: transform 0.2s ease;
}

.center-logo:hover img {
    transform: scale(1.1);
}

/* OCTOPUS */
.octopus-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 25;
    display: flex;
    justify-content: flex-end;
}

.octopus-matrix {
    display: inline-grid;
    gap: 6px;
    transform-origin: top right;
}

.octopus-img {
    width: 48px;
    height: auto;
    transition: transform 0.1s;
}

/* FLASH */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0.15;
    z-index: 999;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">

    <!-- Love Death Robots -->
    <a class="icon-box" href="https://www.goethe.de/ins/za/en/kul/mut/plo.html" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Love_Death_%2B_Robots_logo.svg/512px-Love_Death_%2B_Robots_logo.svg.png">
    </a>

    <!-- Octopus -->
    <a class="icon-box" href="https://www.goethe.de/ins/gh/en/index.html" target="_blank">
        <div id="octopusContainer" class="octopus-container"></div>
    </a>

</div>

<!-- CENTER LOGO -->
<div class="center-logo" id="trigger">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Logo_Black.svg/512px-Logo_Black.svg.png">
</div>

<script>
const octopusContainer = document.getElementById('octopusContainer');

let effectsEnabled = false;

const variants = [
    { src: "https://upload.wikimedia.org/wikipedia/commons/3/3c/Octopus_icon.svg" }
];

const gridConfigs = [
    { count: 1, style: 'grid', template: '1fr' },
    { count: 4, style: 'grid', template: '1fr 1fr' },
    { count: 6, style: 'grid', template: '1fr 1fr 1fr' }
];

function rand(min, max) {
    return Math.random() * (max - min) + min;
}
function randInt(min, max) {
    return Math.floor(rand(min, max + 1));
}

/* STATIC INIT */
function initStatic() {
    const wrapper = document.createElement('div');
    wrapper.className = 'octopus-matrix';

    const img = document.createElement('img');
    img.src = variants[0].src;
    img.className = 'octopus-img';

    wrapper.appendChild(img);

    octopusContainer.innerHTML = '';
    octopusContainer.appendChild(wrapper);
}

/* RANDOMIZE */
function randomizeOctopus() {
    if (!effectsEnabled) return;

    const cfg = gridConfigs[randInt(0, gridConfigs.length - 1)];

    const wrapper = document.createElement('div');
    wrapper.className = 'octopus-matrix';

    wrapper.style.display = 'grid';
    wrapper.style.gridTemplateColumns = cfg.template;

    for (let i = 0; i < cfg.count; i++) {
        const img = document.createElement('img');
        img.src = variants[0].src;
        img.className = 'octopus-img';

        const r = randInt(-6,6);
        img.style.transform = `rotate(${r}deg)`;

        wrapper.appendChild(img);
    }

    octopusContainer.innerHTML = '';
    octopusContainer.appendChild(wrapper);

    const flash = document.createElement('div');
    flash.className = 'flash';
    document.body.appendChild(flash);

    setTimeout(() => flash.remove(), 80);
}

/* GLITCH */
function applyGlitch() {
    if (!effectsEnabled) return;

    const matrix = octopusContainer.querySelector('.octopus-matrix');
    if (!matrix) return;

    const imgs = matrix.querySelectorAll('img');
    if (!imgs.length) return;

    const target = imgs[randInt(0, imgs.length - 1)];
    const clone = target.cloneNode(true);

    const layer = document.createElement('div');
    layer.appendChild(clone);

    layer.style.position = 'absolute';
    layer.style.left = '0';
    layer.style.top = '0';

    matrix.style.position = 'relative';
    matrix.appendChild(layer);

    layer.style.transform = `translate(${randInt(-10,10)}px, ${randInt(-10,10)}px)`;
    layer.style.opacity = 0.7;
    layer.style.filter = `hue-rotate(${randInt(-40,40)}deg)`;

    setTimeout(() => layer.remove(), 80);
}

/* LOOP */
setInterval(() => {
    randomizeOctopus();
    applyGlitch();
}, 700);

/* CLICK TO START */
document.getElementById('trigger').addEventListener('click', () => {
    effectsEnabled = true;
});

/* INIT */
initStatic();

</script>

</body>
</html>
