<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Art of Molecular Dynamics Simulation</title>
    <style>
        :root {
            --blue-bg: #4a69bd;
            --purple-bg: #8e44ad;
            --pink-bg: #c0392b; /* Темно-розовый для фона */
            --light-green: #c8d641;
            --dark-blue: #2c3e50;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: 'Times New Roman', serif;
        }

        .book-cover {
            width: 400px;
            height: 580px;
            background-color: var(--blue-bg);
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 2px;
        }

        /* Верхняя текстовая часть */
        .header {
            padding: 30px;
            color: white;
            text-align: right;
            z-index: 2;
        }

        .author {
            font-size: 14px;
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 50px;
        }

        .title {
            text-align: right;
            margin-top: 20px;
        }

        .title span {
            display: block;
        }

        .the-art {
            font-size: 22px;
            font-style: italic;
        }

        .main-title {
            font-size: 32px;
            font-weight: normal;
            margin-top: 5px;
        }

        /* Зеленая полоса */
        .edition-bar {
            background-color: var(--light-green);
            color: #444;
            padding: 8px 30px;
            text-align: right;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
            z-index: 2;
        }

        /* Нижняя часть с графикой */
        .graphics-area {
            flex-grow: 1;
            background: linear-gradient(45deg, #a51c5d 25%, #7b1346 25%, #7b1346 50%, #a51c5d 50%, #a51c5d 75%, #7b1346 75%, #7b1346 100%);
            background-size: 100px 100px; /* Клетчатый фиолетово-розовый фон */
            position: relative;
            overflow: hidden;
        }

        /* Имитация молекул через CSS */
        .molecule {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #7bed9f, #2ed573 50%, #2f3542 100%);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5);
        }

        /* Добавим несколько сфер для визуального сходства */
        .m1 { top: 20px; left: 30px; }
        .m2 { top: 45px; left: 55px; background: radial-gradient(circle at 30% 30%, #54a0ff, #2e86de 50%, #2c3e50 100%); }
        .m3 { top: 80px; left: 20px; }
        .m4 { top: 150px; left: 150px; transform: scale(1.5); }
        .m5 { bottom: 50px; right: 40px; background: radial-gradient(circle at 30% 30%, #54a0ff, #2e86de 50%, #2c3e50 100%); }
        .m6 { bottom: 100px; left: 80px; }

        /* Логотип Cambridge */
        .footer-logo {
            position: absolute;
            bottom: 15px;
            right: 20px;
            background-color: var(--light-green);
            color: white;
            padding: 3px 10px;
            font-size: 12px;
            font-family: serif;
            font-weight: bold;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="book-cover">
    <div class="header">
        <div class="author">D. C. RAPAPORT</div>
        <div class="title">
            <span class="the-art">The <b style="font-weight: normal; font-size: 28px;">Art</b> of Molecular</span>
            <span class="main-title">Dynamics Simulation</span>
        </div>
    </div>

    <div class="edition-bar">
        Second Edition
    </div>

    <div class="graphics-area">
        <div class="molecule m1"></div>
        <div class="molecule m2"></div>
        <div class="molecule m3"></div>
        <div class="molecule m4"></div>
        <div class="molecule m5"></div>
        <div class="molecule m6"></div>
        
        <div class="footer-logo">CAMBRIDGE</div>
    </div>
</div>

</body>
</html>
